<!DOCTYPE html>
<html>
<head>
    <title>Seren Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0B0F] text-white">
    <div id="app"></div>
    
    <script type="module">
        import { h, render } from 'https://esm.sh/preact';
        import { useState, useEffect } from 'https://esm.sh/preact/hooks';
        import htm from 'https://esm.sh/htm';
        const html = htm.bind(h);
        
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        
        function App() {
            const [tab, setTab] = useState('dashboard');
            const [data, setData] = useState(null);
            const user = tg.initDataUnsafe?.user;
            
            useEffect(() => {
                fetch(`https://api.ka.com/api/dashboard/${user.id}`)
                 .then(r => r.json()).then(setData);
            }, [tab]);
            
            if (!data) return html`<div class="p-4">Loading...</div>`;
            
            return html`
            <div class="p-4 pb-20">
                <div class="flex justify-between items-center mb-4">
                    <h1 class="text-xl font-bold">Seren Chat</h1>
                    <div class="relative">🔔<span class="absolute -top-1 -right-1 bg-red-500 text-xs rounded-full px-1">3</span></div>
                </div>
                
                ${tab === 'dashboard' && html`
                <div class="bg-gradient-to-r from-purple-900 to-indigo-900 p-4 rounded-2xl mb-4">
                    <div class="flex justify-between">
                        <div>
                            <p class="text-sm">Bot Status</p>
                            <p class="text-2xl font-bold text-green-400">${data.bot_status}</p>
                            <p class="text-xs text-gray-300">Seren is running smoothly</p>
                        </div>
                        <img src="robot.png" class="w-16 h-16" />
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-[#1A22] p-3 rounded-xl">
                        <p class="text-xs text-gray-400">Mode</p>
                        <p class="font-bold">Groups Only</p>
                    </div>
                    <div class="bg-[#1A1A22] p-3 rounded-xl">
                        <p class="text-xs text-gray-400">Active Targets</p>
                        <p class="font-bold text-2xl">${data.active_targets} <span class="text-sm">Groups</span></p>
                    </div>
                </div>
                
                <p class="text-sm text-gray-400 mb-2">Statistics (Today)</p>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-[#1A1A22] p-3 rounded-xl">
                        <p class="text-xs text-gray-400">Replies Today</p>
                        <p class="font-bold text-2xl">${data.replies_today}</p>
                    </div>
                    <div class="bg-[#1A1A22] p-3 rounded-xl">
                        <p class="text-xs text-gray-400">Replies This Week</p>
                        <p class="font-bold text-2xl">${data.replies_week}</p>
                    </div>
                </div>
                
                <div class="bg-[#1A1A22] p-3 rounded-xl mt-3">
                    <div class="flex items-center gap-2 mb-1">
                        <span>👑</span>
                        <p class="text-sm">Subscription</p>
                        <p class="ml-auto text-yellow-400 text-sm">${data.subscription_days_left} Days Left</p>
                    </div>
                    <p class="text-green-400 text-sm">1 Month Plan</p>
                    <div class="w-full bg-gray-700 rounded-full h-1.5 mt-2">
                        <div class="bg-purple-500 h-1.5 rounded-full" style="width: ${(data.subscription_days_left/30)*100}%"></div>
                    </div>
                </div>
                `}
                
                <div class="fixed bottom-0 left-0 right-0 bg-[#1A1A22] flex justify-around py-2">
                    <button onClick=${() => setTab('dashboard')} class=${tab==='dashboard'?'text-purple-400':''}>Dashboard</button>
                    <button onClick=${() => setTab('targets')} class=${tab==='targets'?'text-purple-400':''}>Targets</button>
                    <button onClick=${() => setTab('account')} class=${tab==='account'?'text-purple-400':''}>Account</button>
                </div>
            </div>
            `;
        }
        
        render(html`<${App} />`, document.getElementById('app'));
    </script>
</body>
</html>
