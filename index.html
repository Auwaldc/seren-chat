<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seren Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>body { background-color: #0B0E14; color: #FFFFFF; }</style>
</head>
<body class="p-4 pb-24">
    <div class="flex items-center gap-2 mb-6">
        <div class="bg-blue-600 px-3 py-1.5 rounded-xl text-xl font-bold">S</div>
        <div>
            <h1 class="text-xl font-bold">Seren Chat</h1>
            <p class="text-xs text-gray-400">Smart Auto Reply Engine</p>
        </div>
    </div>

    <div id="tab-dashboard" class="space-y-4">
        <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800 flex justify-between items-center">
            <div>
                <p class="text-sm font-semibold">Bot Engine Status</p>
                <p class="text-xs text-green-400">System running 24/7</p>
            </div>
            <span class="bg-green-500 text-black text-xs font-bold px-3 py-1 rounded-full">ACTIVE</span>
        </div>

        <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800">
            <p class="text-sm font-bold mb-3 text-blue-400">Premium Flexible Plans</p>
            <div class="space-y-2 text-xs">
                <div class="flex justify-between p-3 bg-gray-800 rounded-xl"><span>1 Week Premium Access</span><span class="text-green-400 font-bold">$10</span></div>
                <div class="flex justify-between p-3 bg-gray-800 rounded-xl"><span>2 Weeks Premium Access</span><span class="text-green-400 font-bold">$20</span></div>
                <div class="flex justify-between p-3 bg-gray-800 rounded-xl"><span>3 Weeks Premium Access</span><span class="text-green-400 font-bold">$30</span></div>
            </div>
        </div>
    </div>

    <script>window.Telegram.WebApp.ready();</script>
</body>
</html>
